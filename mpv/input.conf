########################################
### Custom
# ALT:(toggle/lua): https://github.com/mpv-player/mpv/issues/8658
TAB  script-binding osc/visibility      # (UNUSED) cycle OSC display
/  cycle-values speed 1.0 1.2 1.4 1.5 1.6 1.8 2.0 2.4    # (UNUSED) reset speed to normal
#/? multiply speed 1/1.1 | scale 1.1
\  cycle-values speed 12 4
|  cycle-values speed 18 36

^  ab-loop                              # (UNUSED) set/clear A-B loop points
{ set ab-loop-a ${time-pos/full}
} set ab-loop-b ${time-pos/full}
# \ no-osd set ab-loop-a ${time-pos}; set ab-loop-b ${=duration}
# | no-osd set ab-loop-a no; no-osd set ab-loop-b no; show-text "clear"
? show-text "ab-loop: ${ab-loop-a} - ${ab-loop-b}"

j  no-osd seek  5 exact                 # (CHG= s)
k  no-osd seek -5 exact                 # (UNUSED)
h  set pause yes ; no-osd  seek -0.8 exact  # (CHG= ^)
l  no-osd  seek  0.8 exact  # (UNUSED)

<  set pause yes ; no-osd seek -0.001 keyframes         # (REMOVE)
>  set pause yes ; no-osd seek  0.001 keyframes         # (REMOVE)
,  frame-back-step
.  frame-step

J  seek  30                     # (CHG= s)
K  seek -30                     # (UNUSED)
# L  no-osd  seek  10                     # (CHG=;:)
# H  no-osd  seek -10                     # (UNUSED)

BS set pause yes ; seek 0 absolute exact  # (CHG=\\) reset position to beginning
# (UNUSED)
# ;  set loop-file yes ; script-message osc-visibility auto
;  set loop-file yes ; script-binding osc/visibility
:  set loop-file no ; script-message osc-visibility always   # (UNUSED)
# ; cycle loop-file

a  cycle audio                          # (UNUSED) switch audio streams
-  add volume -1                        # (UNUSED)
'  quit                                 # (UNUSED) right hand "quit" alias for !ranger
+  add volume  1                        # (UNUSED)
=  add volume  1                        # (UNUSED)
UP    add volume  1                     # (CHG= J)
DOWN  add volume -1                     # (CHG= K)
M  cycle mute                           # (CHG= m) use "m" to !r.mpv-category

s  cycle sub                            # (CHG=Cs) cycle through subtitles
!  add sub-scale -0.02                  # (REMOVE) decrease subtitle font size
@  add sub-scale +0.02                  # (REMOVE) increase subtitle font size
(  sub-step -1                          # (UNUSED) immediately display next subtitle
)  sub-step +1                          # (UNUSED)                     previous
# ? cycle-values window-scale 0.5 2 1   # (??????) switch between 1/2, 2x, unresized window size

Ctrl+s screenshot                       # (CHG=As) take a screenshot
Alt+s screenshot window                 # (CHG=CAs) ...with subtitles and OSD, and scaled
Ctrl+Alt+s screenshot each-frame        # (UNUSED) automatically screenshot every frame


