e cycle-values lavfi-complex "[vid1] edgedetect=low=0.1:high=0.2 [vo]" "[vid2] edgedetect=low=0.1:high=0.2 [vo]"
# Side-by-Side Edge/Block boundary comparison (vid1 vs vid2)
E set lavfi-complex "[vid1] edgedetect=low=0.1:high=0.2 [v1]; [vid2] edgedetect=low=0.1:high=0.2 [v2]; [v1] [v2] hstack [vo]"
